<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>some input types</title>
</head>
<body>
    <center>
    <h2>basic form</h2>
    <form>
    name: <input placeholder="enter your name" required><br><br>
    email: <input type="email" placeholder="enter your email"><br><br>
    number: <input type="number" placeholder="enter your number"><br><br>
    password: <input type="password" placeholder="enter your password"><br><br>
    <button>submit</button>
    </form>
    
    <hr>
    select your gender:
    <input type="radio" name="gender">male
    <input type="radio" name="gender"> female
    <input type="radio" name="gender">other
    <hr>
    
    </center>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>some input types</title>
</head>
<body>
    <center>
    <h2>basic form</h2>
    <form>
    name: <input placeholder="enter your name" required><br><br>
    email: <input type="email" placeholder="enter your email"><br><br>
    number: <input type="number" placeholder="enter your number"><br><br>
    password: <input type="password" placeholder="enter your password"><br><br>
    <button>submit</button>
    </form>
    
    <hr>
    select your gender:
    <input type="radio" name="gender" value="male">male
    <input type="radio" name="gender" value="female"> female
    <input type="radio" name="gender" value="other">other
    <hr>

    tick the languages you know:
    <input type="checkbox">html
    <input type="checkbox">css
    <input type="checkbox">cpp
    <input type="checkbox">java
    <input type="checkbox">html
    <input type="checkbox">python


    <hr>
    <select>
        <option> --select your city -- </option>
        <option>mumbai</option>
        <option>delhi</option>
        <option>pune</option>
    </select>
    incase of other city:<input type="text" placeholder="enter your city">


    </center>
</body>
</html>
